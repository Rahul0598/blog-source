name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout theme
        run: |
          git submodule sync -- themes/bettermotherfuckinghugowebsite
          git submodule update --init --depth 1 themes/bettermotherfuckinghugowebsite

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            klakegg/hugo:ext-pandoc \
            --destination _site \
            --cleanDestinationDir \
            --baseURL "https://rahuldevajji.com/"

      - name: Remove macOS metadata
        run: find _site -name .DS_Store -delete

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
