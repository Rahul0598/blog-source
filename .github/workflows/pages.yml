name: Build and publish site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-site
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      BLOG_PUBLISH_TOKEN: ${{ secrets.BLOG_PUBLISH_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Checkout theme
        run: |
          git submodule sync -- themes/bettermotherfuckinghugowebsite
          git submodule update --init --depth 1 themes/bettermotherfuckinghugowebsite

      - name: Build with Hugo
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            klakegg/hugo:ext-pandoc \
            --destination _site \
            --cleanDestinationDir \
            --baseURL "https://rahuldevajji.com/"

      - name: Prepare Pages files
        run: |
          find _site -name .DS_Store -delete
          touch _site/.nojekyll

      - name: Publish to Pages repository
        if: env.BLOG_PUBLISH_TOKEN != ''
        run: |
          git clone --depth 1 "https://x-access-token:${BLOG_PUBLISH_TOKEN}@github.com/Rahul0598/blog.git" publish
          find publish -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R _site/. publish/
          cd publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No generated changes to publish."
          else
            git commit -m "Deploy ${GITHUB_SHA}"
            git push origin master
          fi

      - name: Skip publish without token
        if: env.BLOG_PUBLISH_TOKEN == ''
        run: |
          echo "::warning::BLOG_PUBLISH_TOKEN is not set; site was built but not pushed to Rahul0598/blog."
