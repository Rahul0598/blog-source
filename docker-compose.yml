services:
  build:
   image: klakegg/hugo:ext-pandoc
   platform: linux/amd64
   volumes:
     - ./config.toml:/src/config.toml:z
     - ./content:/src/content:z
     - ./layouts:/src/layouts:z
     - ./static:/src/static:z
     - ./themes:/src/themes:z

  server:
    image: klakegg/hugo:ext-pandoc
    command: server --navigateToChanged
    platform: linux/amd64
    volumes:
      - ./config.toml:/src/config.toml:z
      - ./content:/src/content:z
      - ./layouts:/src/layouts:z
      - ./static:/src/static:z
      - ./themes:/src/themes:z
    ports:
      - 1313:1313
  
  publish:
    image: klakegg/hugo:ext-pandoc
    entrypoint: hugo-official
    platform: linux/amd64
    environment:
      HUGO_ENV_ARG: "production"
    volumes:
      - .:/src:z

